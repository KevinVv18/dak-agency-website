name: Fetch remote assets (temporal)

# Workflow de apoyo para la sesión cloud de Claude: el sandbox no tiene
# acceso a internet general, pero los runners de GitHub sí. Fase 2: captura
# pantallas de plan.dakagency.net (demo Calculadora) y las commitea a la rama.
# Se elimina junto con _drive-tmp/ cuando los assets finales estén listos.

on:
  push:
    branches:
      - claude/demos-section-redesign-bnkxbz
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shots:
    # Solo corre si el commit lo pide explícitamente (el push del propio bot
    # usa GITHUB_TOKEN y nunca re-dispara workflows).
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[fetch-drive]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Screenshot plan.dakagency.net
        run: |
          mkdir -p _drive-tmp /tmp/shots && cd /tmp/shots
          npm init -y >/dev/null
          npm i --no-audit --no-fund playwright@1.49.1 >/dev/null
          npx playwright install --with-deps chromium
          cat > shot.js <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const shoot = async (file, ctx) => {
              const page = await browser.newPage(ctx);
              await page.goto('https://plan.dakagency.net/', { waitUntil: 'networkidle', timeout: 60000 });
              await page.waitForTimeout(5000);
              await page.screenshot({ path: file });
              await page.close();
            };
            const out = process.env.GITHUB_WORKSPACE + '/_drive-tmp';
            await shoot(out + '/calc-mobile.png', {
              viewport: { width: 390, height: 844 },
              deviceScaleFactor: 2,
              isMobile: true,
              hasTouch: true,
              userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1',
            });
            await shoot(out + '/calc-desktop.png', { viewport: { width: 1280, height: 800 }, deviceScaleFactor: 2 });
            await browser.close();
          })();
          EOF
          node shot.js
          file "$GITHUB_WORKSPACE"/_drive-tmp/calc-*.png

      - name: Commit assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _drive-tmp
          git commit -m "chore: capturas de plan.dakagency.net para el demo Calculadora"
          git push origin "HEAD:${GITHUB_REF_NAME}"
