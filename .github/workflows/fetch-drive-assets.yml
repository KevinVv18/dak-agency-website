name: Fetch Drive assets (temporal)

# Workflow de un solo uso: descarga los diseños/imágenes del folder de Drive
# (compartido por enlace) y los commitea a la rama para que la sesión cloud
# de Claude pueda verlos y optimizarlos. El sandbox de la sesión no tiene
# acceso a drive.google.com, pero los runners de GitHub sí.
# Se elimina junto con _drive-tmp/ cuando los assets finales estén listos.

on:
  push:
    branches:
      - claude/demos-section-redesign-bnkxbz
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    # Solo corre si el commit lo pide explícitamente (el push del propio bot
    # usa GITHUB_TOKEN y nunca re-dispara workflows).
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[fetch-drive]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download from Google Drive
        run: |
          pip install --quiet gdown
          mkdir -p _drive-tmp
          declare -A files=(
            ["diseno-borrador.jpg"]="19Ej-er43qOIu-7nT90cKhBTBaaDMDcVy"
            ["inmobiliaria.png"]="19BSQgVRwGyvqGK-O48Jeb8d19NwuktSw"
            ["robot.png"]="10n8ITjGbr8yz-xdkjXNzgw5WruF3gksU"
            ["cartera.png"]="1rDKZ54d-4ZMb9hbzJrXLNLwLLXeGSO_O"
            ["periodico.png"]="1RXukMubDYkf3KdhNZuffLfnjtRLB-BS8"
            ["web1.png"]="1qYZ2-YcHs-rTIcgMNvDdmPI6VUFD13EO"
          )
          fail=0
          for name in "${!files[@]}"; do
            id="${files[$name]}"
            echo "→ $name ($id)"
            gdown --quiet "https://drive.google.com/uc?id=${id}" -O "_drive-tmp/${name}" || { echo "::error::gdown falló para ${name}"; fail=1; continue; }
            mime=$(file --brief --mime-type "_drive-tmp/${name}")
            if [[ "$mime" != image/* ]]; then
              echo "::error::${name} no es imagen (mime: ${mime}) — ¿el archivo es público por enlace?"
              head -c 400 "_drive-tmp/${name}" || true
              rm -f "_drive-tmp/${name}"
              fail=1
            fi
          done
          ls -la _drive-tmp/
          exit $fail

      - name: Commit assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _drive-tmp
          git commit -m "chore: assets temporales del Drive para rediseño de demos"
          git push origin "HEAD:${GITHUB_REF_NAME}"
