name: Verify inmobiliaria (one-shot)
on:
  push:
    branches: [claude/demos-section-redesign-bnkxbz]
jobs:
  verify:
    if: contains(github.event.head_commit.message, '[verify-inmo]')
    runs-on: ubuntu-latest
    steps:
      - name: Curl subdominio
        run: |
          echo "HTTP status:"
          curl -sS -o /dev/null -w "%{http_code}\n" --max-time 25 "https://inmobiliaria.dakagency.net/"
          echo "--- <title> y marca ---"
          curl -sS --max-time 25 "https://inmobiliaria.dakagency.net/" | grep -oE '<title>[^<]+</title>|Construimos el norte|Norvia|Recorrido 360' | head -6
