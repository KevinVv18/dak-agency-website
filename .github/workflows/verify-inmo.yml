name: Verify inmobiliaria v2 (one-shot)
on:
  push:
    branches: [claude/demos-section-redesign-bnkxbz]
jobs:
  verify:
    if: contains(github.event.head_commit.message, '[verify-inmo]')
    runs-on: ubuntu-latest
    steps:
      - name: Curl subdominio
        run: |
          echo "HTTP index:"; curl -sS -o /dev/null -w "%{http_code}\n" --max-time 25 "https://inmobiliaria.dakagency.net/"
          echo "Marcadores v2:"; curl -sS --max-time 25 "https://inmobiliaria.dakagency.net/" | grep -coE 'pannellum|prop-casa-lujo|hero\.webp' || true
          echo "HTTP pano:"; curl -sS -o /dev/null -w "%{http_code}\n" --max-time 30 "https://inmobiliaria.dakagency.net/assets/pano-lounge.jpg"
          echo "HTTP vendor:"; curl -sS -o /dev/null -w "%{http_code}\n" --max-time 25 "https://inmobiliaria.dakagency.net/vendor/pannellum.js"
