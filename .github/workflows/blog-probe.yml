name: Blog probe (solo lectura, temporal)

# Sonda de SOLO LECTURA: lista los slugs publicados en el blog WordPress
# (REST pública + sitemap de Rank Math). No usa secrets ni toca el servidor.
# La usa la sesión cloud de Claude porque su sandbox no puede salir a
# dakagency.net. Se elimina al terminar la tarea del blog.

on:
  push:
    branches:
      - claude/demos-section-redesign-bnkxbz

jobs:
  probe:
    if: contains(github.event.head_commit.message, '[blog-probe]')
    runs-on: ubuntu-latest
    steps:
      - name: Slugs publicados (REST pública)
        run: |
          echo "=== wp-json posts (slug | link | date) ==="
          curl -sS --max-time 30 "https://dakagency.net/blog/wp-json/wp/v2/posts?per_page=100&_fields=slug,link,date" \
            | python3 -c "import json,sys; [print(p['date'][:10], '|', p['slug'], '|', p['link']) for p in json.load(sys.stdin)]" \
            || echo "REST falló"
          echo "=== sitemap de posts (Rank Math) ==="
          curl -sS --max-time 30 "https://dakagency.net/blog/post-sitemap.xml" \
            | grep -oE '<loc>[^<]+</loc>' | sed 's/<[^>]*>//g' || echo "sitemap falló"
