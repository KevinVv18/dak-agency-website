name: Swap featured 0032 (one-shot)

# Reemplaza la imagen destacada del post ya publicado
# fotografia-de-producto-para-vender-online por el flyer nuevo del Drive
# (Catálogos Digitales), vía rsync a staging + lib/update-featured.php.
# Se elimina tras ejecutarse.

on:
  push:
    branches:
      - claude/demos-section-redesign-bnkxbz

concurrency:
  group: blog-autopublish
  cancel-in-progress: false

jobs:
  swap:
    if: contains(github.event.head_commit.message, '[swap-img]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir contenido al servidor (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: _blog-content/
          remote_path: /home/u567580447/dak-autopost/
          remote_host: 89.116.115.11
          remote_port: 65002
          remote_user: u567580447
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Reemplazar imagen destacada (WP-CLI)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 89.116.115.11
          username: u567580447
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            cd /home/u567580447/domains/dakagency.net/public_html/blog
            wp eval-file /home/u567580447/dak-autopost/lib/update-featured.php \
              fotografia-de-producto-para-vender-online \
              /home/u567580447/dak-autopost/assets/fotografia-de-producto-catalogo-digital-dak.webp \
              "Catálogo digital con fotografía de producto para vender online - DAK Agency"
