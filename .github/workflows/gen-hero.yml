# Generador temporal de assets del hero inmobiliario (se elimina tras elegir).
# Busca fotos de villa al atardecer (Openverse, sin API key), y por cada
# candidata produce: plate graduado, recorte con alfa (rembg) y una miniatura
# del efecto compuesto (NORVIA detrás de la casa) para elegir la mejor.
name: Gen Hero Candidates
on:
  push:
    branches: [claude/demos-section-redesign-bnkxbz]
permissions:
  contents: write
jobs:
  gen:
    if: contains(github.event.head_commit.message, '[gen-hero]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/demos-section-redesign-bnkxbz
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install --quiet rembg pillow requests onnxruntime
      - name: Generate candidates
        run: python3 .github/scripts/gen_hero.py
      - name: Commit candidates
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add _inmobiliaria-demo/_herocand
          git commit -m "chore: candidatos de hero generados [skip-deploy]" || { echo "nada que commitear"; exit 0; }
          git push origin claude/demos-section-redesign-bnkxbz
