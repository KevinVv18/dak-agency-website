name: Diagnóstico inmobiliaria (one-shot)

# Fase 4: ¿ya existe el docroot del subdominio? ¿hay archivos del demo
# (norvia/inmobiliaria) en algún lugar de la cuenta? Solo lectura.

on:
  push:
    branches:
      - claude/demos-section-redesign-bnkxbz

jobs:
  diag:
    if: contains(github.event.head_commit.message, '[diag-inmo]')
    runs-on: ubuntu-latest
    steps:
      - name: Docroot y búsqueda de archivos del demo (SSH, solo lectura)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 89.116.115.11
          username: u567580447
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            echo '== dominios ahora =='
            ls /home/u567580447/domains/
            echo '== docroot inmobiliaria (si existe) =='
            ls -la /home/u567580447/domains/inmobiliaria.dakagency.net/public_html/ 2>/dev/null || echo '(no existe el docroot)'
            echo '== búsqueda de archivos norvia/inmobiliaria en la cuenta (2 niveles) =='
            find /home/u567580447 -maxdepth 4 \( -iname '*norvia*' -o -iname '*inmobiliaria*' \) -not -path '*/dak-autopost/*' 2>/dev/null | head -20 || true
            echo '== fin =='
