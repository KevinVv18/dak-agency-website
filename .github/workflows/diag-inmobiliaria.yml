name: Diagnóstico inmobiliaria (one-shot)

# Fase 3: sonda de solo lectura del blog (qué slugs están publicados) para
# saber si el cron del servidor ya drenó 0031/0032 esta semana.

on:
  push:
    branches:
      - claude/demos-section-redesign-bnkxbz

jobs:
  diag:
    if: contains(github.event.head_commit.message, '[diag-inmo]')
    runs-on: ubuntu-latest
    steps:
      - name: Slugs publicados (REST pública)
        run: |
          curl -sS --max-time 30 "https://dakagency.net/blog/wp-json/wp/v2/posts?per_page=20&_fields=slug,link,date" \
            | python3 -c "import json,sys; [print(p['date'][:10], '|', p['slug']) for p in json.load(sys.stdin)]"
