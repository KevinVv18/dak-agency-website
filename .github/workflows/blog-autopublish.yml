name: Blog Auto-Publish (DAK)

# Publica el siguiente post en cola (_blog-content/queue/) al blog WordPress.
#
# Por qué este diseño: el `ssh`/`scp` plano del runner de GitHub da timeout
# hacia el SSH de Hostinger (puerto 65002), pero los actions que corren en
# DOCKER sí conectan. Por eso:
#   1) burnett01/rsync-deployments (Docker) sube _blog-content/ a un staging.
#   2) appleboy/ssh-action (Docker) ejecuta WP-CLI en el servidor.
# Idempotente por slug: publica el primer post de la cola que aún no exista
# (no necesita commit-back). 1 post por corrida = drip.
#
# Ritmo: Lun / Mié / Vie a las 09:00 hora Perú (14:00 UTC).

# NOTA: el schedule está desactivado porque el SSH desde los runners de GitHub
# es poco fiable hacia Hostinger (timeout intermitente según la IP del runner).
# El cron real corre en el SERVIDOR (hPanel Cron) ejecutando
# _blog-content/lib/publish-on-server.sh. Este workflow queda solo para disparo
# manual (respaldo) desde la pestaña Actions.
on:
  workflow_dispatch:
    inputs:
      status:
        description: 'Estado del post a crear'
        type: choice
        default: 'publish'
        options:
          - publish
          - draft
          - future

permissions:
  contents: read

concurrency:
  group: blog-autopublish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Subir el contenido al servidor (rsync corre en Docker → sí conecta)
      - name: Subir contenido al servidor
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: _blog-content/
          remote_path: /home/u567580447/dak-autopost/
          remote_host: 89.116.115.11
          remote_port: 65002
          remote_user: u567580447
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 2) Ejecutar WP-CLI en el servidor (SSH corre en Docker → sí conecta)
      - name: Publicar siguiente post (WP-CLI vía SSH en Docker)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 89.116.115.11
          username: u567580447
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: POST_STATUS
          script: bash /home/u567580447/dak-autopost/lib/publish-on-server.sh /home/u567580447/dak-autopost
        env:
          POST_STATUS: ${{ github.event.inputs.status || 'publish' }}
